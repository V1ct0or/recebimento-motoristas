<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Recebimento Motoristas</title>

<style>

body{
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#e4002b;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

#resultado{
    border:1px solid #ccc;
    max-height:250px;
    overflow-y:auto;
    margin-bottom:15px;
}

#resultado div{
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

#resultado div:hover{
    background:#f0f0f0;
}

</style>
</head>
<body>

<h2>Recebimento de Motoristas</h2>

<label>Pesquisar Produto</label>
<input type="text" id="pesquisa">

<div id="resultado"></div>

<label>Fornecedor</label>
<input type="text" id="fornecedor" readonly>

<label>Produto</label>
<input type="text" id="produto" readonly>

<label>NF</label>
<input type="text" id="nf">

<label>Placa</label>
<input type="text" id="placa">

<label>Motorista</label>
<input type="text" id="motorista">

<button>Registrar Chegada</button>

<script>

let linhasCSV = [];

async function carregarCSV() {

    const resposta = await fetch("produtos.csv.CSV");

    const texto = await resposta.text();

    linhasCSV = texto
        .split(/\r?\n/)
        .filter(linha => linha.trim() !== "");

}

carregarCSV();

const pesquisa = document.getElementById("pesquisa");
const resultado = document.getElementById("resultado");

pesquisa.addEventListener("input", function(){

    const busca = this.value.toLowerCase();

    resultado.innerHTML = "";

    linhasCSV
        .filter(linha => linha.toLowerCase().includes(busca))
        .slice(0,50)
        .forEach(linha => {

            const item = document.createElement("div");

            item.textContent = linha;

            item.onclick = function(){

                let partes = linha.split(";");

                if(partes.length < 2){
                    partes = linha.split(",");
                }

                document.getElementById("fornecedor").value =
                    partes[0] || "";

                document.getElementById("produto").value =
                    partes[1] || "";

            };

            resultado.appendChild(item);

        });

});

</script>

</body>
</html>
