<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Recebimento Motoristas</title>

<style>
body{
    font-family: Arial;
    max-width: 600px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    background:#e4002b;
    color:white;
    border:none;
    cursor:pointer;
}

#resultado{
    border:1px solid #ccc;
    max-height:250px;
    overflow-y:auto;
}

#resultado div{
    padding:8px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

#resultado div:hover{
    background:#f0f0f0;
}
</style>
</head>

<body>

<h2>Recebimento de Motoristas</h2>

<label>Pesquisar Produto</label>
<input type="text" id="pesquisa">

<div id="resultado"></div>

<br>

<label>Fornecedor</label>
<input type="text" id="fornecedor" readonly>

<label>Produto</label>
<input type="text" id="produto" readonly>

<label>NF</label>
<input type="text" id="nf">

<label>Placa</label>
<input type="text" id="placa">

<label>Motorista</label>
<input type="text" id="motorista">

<button>
Registrar Chegada
</button>

<script>

const pesquisa =
document.getElementById("pesquisa");

const resultado =
document.getElementById("resultado");

pesquisa.addEventListener("input", async () => {

const texto =
pesquisa.value.toLowerCase();

const resposta =
await fetch("produtos.csv.CSV");

const csv =
await resposta.text();

const linhas =
csv.split("\n");

resultado.innerHTML = "";

linhas.forEach(linha => {

if(linha.toLowerCase().includes(texto))
{

const div =
document.createElement("div");

div.innerText = linha;

div.onclick = () => {
    
const campos =
linha.split(";");

document.getElementById(
"fornecedor"
).value = campos[0] || "";

document.getElementById(
"produto"
).value = campos[1] || "";

};

resultado.appendChild(div);

}

});

});

</script>

</body>
</html>
